<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Issue Board — Indian IPO Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E1E;--text:#EEF0FB;--muted:#8C93B5;--faint:#5B6285;
    --glass:rgba(255,255,255,.05);--edge:rgba(255,255,255,.1);--edge-hi:rgba(255,255,255,.2);
    --violet:#8B6CFF;--cyan:#3FD6E4;--green:#2EE6A8;--red:#FF5C7A;--gold:#F5C452;
    --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Outfit',system-ui,sans-serif;color:var(--text);line-height:1.55;
    background:var(--bg);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1100px;margin:0 auto;padding:0 20px;position:relative;z-index:2}

  /* ── Ambient orbs (depth layer) ── */
  .orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.35}
  .orb.o1{width:480px;height:480px;background:#4A2FBF;top:-140px;left:-120px;animation:drift1 26s ease-in-out infinite alternate}
  .orb.o2{width:380px;height:380px;background:#0E5F63;bottom:-100px;right:-80px;animation:drift2 32s ease-in-out infinite alternate}
  .orb.o3{width:260px;height:260px;background:#7A3B8F;top:40%;left:60%;animation:drift3 38s ease-in-out infinite alternate;opacity:.22}
  @keyframes drift1{to{transform:translate(90px,60px) scale(1.15)}}
  @keyframes drift2{to{transform:translate(-70px,-50px) scale(1.1)}}
  @keyframes drift3{to{transform:translate(-120px,40px)}}

  /* ── Top bar ── */
  .topbar{position:sticky;top:0;z-index:20;background:rgba(11,14,30,.65);backdrop-filter:blur(16px);border-bottom:1px solid var(--edge)}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:60px}
  .logo{font-weight:800;font-size:17px}
  .logo .tick{color:var(--violet)}
  .stamp{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;gap:7px;align-items:center}
  .stamp .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green);animation:pulse 2.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* ── Hero with 3D cube ── */
  .hero{padding:60px 0 12px;display:flex;align-items:center;justify-content:space-between;gap:30px;flex-wrap:wrap}
  .hero h1{font-weight:800;font-size:clamp(28px,5vw,50px);line-height:1.07;letter-spacing:-0.03em;max-width:15ch}
  .hero h1 em{font-style:normal;background:linear-gradient(90deg,var(--violet),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{color:var(--muted);margin-top:12px;max-width:46ch;font-size:15px}

  .scene{width:150px;height:150px;perspective:700px;flex-shrink:0}
  .cube{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:spin 14s linear infinite}
  @keyframes spin{from{transform:rotateX(-18deg) rotateY(0)}to{transform:rotateX(-18deg) rotateY(360deg)}}
  .face{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:52px;border:1px solid var(--edge-hi);border-radius:16px;
    background:linear-gradient(135deg,rgba(139,108,255,.16),rgba(63,214,228,.08));
    backdrop-filter:blur(4px);
    background-clip:padding-box;
  }
  .face span{background:linear-gradient(135deg,var(--violet),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
  .face.f{transform:translateZ(75px)} .face.b{transform:rotateY(180deg) translateZ(75px)}
  .face.l{transform:rotateY(-90deg) translateZ(75px)} .face.r{transform:rotateY(90deg) translateZ(75px)}
  .face.t{transform:rotateX(90deg) translateZ(75px)} .face.d{transform:rotateX(-90deg) translateZ(75px)}

  /* ── Pills ── */
  .pills{display:flex;gap:8px;padding:28px 0 22px;flex-wrap:wrap}
  .pills button{
    appearance:none;cursor:pointer;font:inherit;font-weight:600;font-size:13.5px;
    color:var(--muted);background:var(--glass);border:1px solid var(--edge);
    border-radius:99px;padding:8px 17px;transition:all .2s ease;
  }
  .pills button:hover{border-color:var(--edge-hi);color:var(--text);transform:translateY(-2px)}
  .pills button[aria-selected="true"]{background:linear-gradient(90deg,var(--violet),#6A4DE0);border-color:transparent;color:#fff;box-shadow:0 6px 22px rgba(139,108,255,.35)}
  .pills button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .pills .n{font-family:var(--mono);font-size:11px;opacity:.75;margin-left:5px}

  /* ── 3D tilt cards ── */
  main{padding-bottom:90px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px;perspective:1400px}
  .card{
    background:linear-gradient(150deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
    border:1px solid var(--edge);border-radius:22px;
    padding:22px;display:flex;flex-direction:column;gap:15px;
    transform-style:preserve-3d;will-change:transform;
    transition:box-shadow .25s ease;position:relative;overflow:hidden;
    opacity:0;transform:translateY(26px);
  }
  .card.in{animation:rise .6s cubic-bezier(.2,.8,.2,1) forwards}
  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  .card:hover{box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 0 1px var(--edge-hi)}
  .card .glare{
    position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .25s ease;
    background:radial-gradient(400px circle at var(--gx,50%) var(--gy,50%),rgba(255,255,255,.14),transparent 55%);
  }
  .card:hover .glare{opacity:1}
  .card > *{transform:translateZ(24px)}
  .card .glare{transform:none}

  .card-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .co-name{font-weight:700;font-size:18.5px;letter-spacing:-0.01em;line-height:1.25}
  .co-meta{font-size:12.5px;color:var(--muted);margin-top:4px}
  .chip{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;border-radius:99px;padding:4px 10px;white-space:nowrap}
  .chip.open{background:rgba(46,230,168,.12);color:var(--green);border:1px solid rgba(46,230,168,.3)}
  .chip.upcoming{background:rgba(245,196,82,.12);color:var(--gold);border:1px solid rgba(245,196,82,.3)}
  .chip.listed{background:var(--glass);color:var(--muted);border:1px solid var(--edge)}
  .chip.sme{background:none;border:1px dashed var(--edge-hi);color:var(--faint);margin-left:5px}

  .big{display:flex;align-items:flex-end;gap:12px}
  .big .x{font-weight:800;font-size:42px;line-height:1;letter-spacing:-0.03em;color:var(--green);text-shadow:0 0 28px rgba(46,230,168,.4)}
  .big .x.cold{color:var(--red);text-shadow:0 0 28px rgba(255,92,122,.35)}
  .big .x.wait{color:var(--faint);font-size:27px;text-shadow:none}
  .big .x.pop{color:var(--gold);text-shadow:0 0 28px rgba(245,196,82,.35)}
  .big .cap{font-family:var(--mono);font-size:11px;color:var(--muted);padding-bottom:5px;text-transform:uppercase;letter-spacing:.06em}

  .meter{display:flex;flex-direction:column;gap:8px}
  .m-row{display:grid;grid-template-columns:42px 1fr 56px;gap:10px;align-items:center}
  .m-row .cat{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.05em}
  .m-row .bar{height:6px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
  .m-row .fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--cyan),var(--green));width:0;transition:width 1s cubic-bezier(.2,.8,.2,1)}
  .m-row .fill.under{background:linear-gradient(90deg,#B23,var(--red))}
  .m-row .v{font-family:var(--mono);font-size:12.5px;font-weight:700;text-align:right}
  .m-row .v.under{color:var(--red)}

  .facts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;border-top:1px solid var(--edge);padding-top:14px}
  .fact .k{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.07em}
  .fact .v{font-family:var(--mono);font-size:13.5px;font-weight:500;margin-top:3px}
  .fact .v .gmp{color:var(--green)}

  .rail{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .rail .cd{color:#0B0E1E;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:7px;padding:3px 9px;font-weight:700}
  .rail .cd.closed{background:var(--glass);color:var(--muted);border:1px solid var(--edge)}
  .rail .arrow{color:var(--faint)}
  .empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:70px 20px;border:1px dashed var(--edge-hi);border-radius:22px}
  footer{border-top:1px solid var(--edge);padding:24px 0 46px;font-size:12.5px;color:var(--faint);position:relative;z-index:2}
  footer .wrap{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}

  @media (max-width:760px){.scene{display:none}}
  @media (max-width:640px){.grid{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){
    .orb,.cube,.stamp .dot{animation:none!important}
    .card{opacity:1;transform:none}
    .card.in{animation:none}
    .m-row .fill{transition:none}
  }
</style>
</head>
<body>

<div class="orbs" aria-hidden="true"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<div class="topbar"><div class="wrap">
  <div class="logo">Issue<span class="tick">▲</span>Board</div>
  <div class="stamp" id="stamp"><span class="dot"></span>loading…</div>
</div></div>

<div class="wrap">
  <section class="hero">
    <div>
      <h1>Indian IPOs, <em>in another dimension.</em></h1>
      <p>Subscription heat, grey-market premium, price bands and key dates — every NSE &amp; BSE issue, refreshed through the trading day.</p>
    </div>
    <div class="scene" aria-hidden="true">
      <div class="cube">
        <div class="face f"><span>₹</span></div><div class="face b"><span>▲</span></div>
        <div class="face l"><span>×</span></div><div class="face r"><span>%</span></div>
        <div class="face t"><span>◆</span></div><div class="face d"><span>₹</span></div>
      </div>
    </div>
  </section>
  <nav class="pills" role="tablist" id="pills"></nav>
  <main><div class="grid" id="grid" aria-live="polite"></div></main>
</div>

<footer><div class="wrap">
  <span>GMP is an unofficial grey-market indication — not investment advice.</span>
  <span style="font-family:var(--mono)" id="footStamp"></span>
</div></footer>

<script>
const fmtINR = n => "₹" + n.toLocaleString("en-IN");
const fmtDate = iso => new Date(iso+"T00:00:00").toLocaleDateString("en-IN",{day:"numeric",month:"short"});
const TABS=[{key:"open",label:"Open now"},{key:"upcoming",label:"Upcoming"},{key:"listed",label:"Listed"}];
let DATA=null, active="open";
const daysTo = iso => Math.ceil((new Date(iso+"T17:00:00+05:30")-Date.now())/86400000);
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
const canHover = matchMedia('(hover: hover) and (pointer: fine)').matches;

async function load(){
  try{
    DATA = window.__IPO_DATA__ || await (await fetch("./data/ipos.json",{cache:"no-store"})).json();
    const t = "Updated " + new Date(DATA.lastUpdated).toLocaleString("en-IN",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}) + " IST";
    document.getElementById("stamp").innerHTML='<span class="dot"></span>'+t;
    document.getElementById("footStamp").textContent=t+(DATA.source==="sample-data"?" · sample data":"");
    renderPills(); render();
  }catch(e){
    document.getElementById("grid").innerHTML='<div class="empty">Could not load data/ipos.json — serve over HTTP.</div>';
  }
}
function renderPills(){
  const el=document.getElementById("pills"); el.innerHTML="";
  TABS.forEach(t=>{
    const n=DATA.ipos.filter(i=>i.status===t.key).length;
    const b=document.createElement("button");
    b.setAttribute("role","tab"); b.setAttribute("aria-selected",String(t.key===active));
    b.innerHTML=t.label+'<span class="n">'+n+'</span>';
    b.onclick=()=>{active=t.key;renderPills();render();};
    el.appendChild(b);
  });
}
function bigHTML(ipo){
  if(ipo.status==="listed"&&ipo.listing){
    const g=ipo.listing.gainPct;
    return '<div class="big"><span class="x pop" data-count="'+g+'" data-suffix="%" data-prefix="'+(g>=0?"+":"")+'">0%</span><span class="cap">listing gain · '+fmtINR(ipo.listing.issuePrice)+' → '+fmtINR(ipo.listing.listPrice)+'</span></div>';
  }
  if(!ipo.subscription){
    const d=daysTo(ipo.openDate);
    return '<div class="big"><span class="x wait">'+(d>0?"T−"+d:"soon")+'</span><span class="cap">opens '+fmtDate(ipo.openDate)+'</span></div>';
  }
  const tot=ipo.subscription.total;
  return '<div class="big"><span class="x'+(tot<1?" cold":"")+'" data-count="'+tot+'" data-suffix="×">0×</span><span class="cap">subscribed overall</span></div>';
}
function meterHTML(ipo){
  if(!ipo.subscription||ipo.status==="listed") return "";
  const cats=[["QIB","qib"],["NII","nii"],["RET","retail"]];
  const max=Math.max(2,...cats.map(c=>ipo.subscription[c[1]]||0));
  return '<div class="meter">'+cats.map(([lbl,key])=>{
    const v=ipo.subscription[key],w=Math.min(100,(v/max)*100),u=v<1?" under":"";
    return '<div class="m-row"><span class="cat">'+lbl+'</span><span class="bar"><span class="fill'+u+'" data-w="'+w+'"></span></span><span class="v'+u+'">'+v.toFixed(2)+'×</span></div>';
  }).join("")+'</div>';
}
function railHTML(ipo){
  let cd="";
  if(ipo.status==="open"){
    const d=daysTo(ipo.closeDate);
    cd=d>=0?'<span class="cd">closes in '+(d===0?"hours":d+"d")+'</span>':'<span class="cd closed">closed</span>';
  }
  return '<div class="rail">'+cd+'<span>'+fmtDate(ipo.openDate)+'–'+fmtDate(ipo.closeDate)+'</span><span class="arrow">→</span><span>allot '+(ipo.allotmentDate?fmtDate(ipo.allotmentDate):"tba")+'</span><span class="arrow">→</span><span>lists '+(ipo.listingDate?fmtDate(ipo.listingDate):"tba")+'</span></div>';
}
function render(){
  const grid=document.getElementById("grid");
  const rows=DATA.ipos.filter(i=>i.status===active);
  if(!rows.length){grid.innerHTML='<div class="empty">Nothing here right now — check the other tabs.</div>';return;}
  grid.innerHTML=rows.map(ipo=>{
    const minAmt=ipo.priceBand.max*ipo.lotSize;
    return '<article class="card"><div class="glare"></div><div class="card-top"><div><div class="co-name">'+ipo.company+'</div><div class="co-meta">'+ipo.sector+' · '+ipo.exchange+'</div></div><div><span class="chip '+ipo.status+'">'+ipo.status+'</span>'+(ipo.board==="SME"?'<span class="chip sme">SME</span>':'')+'</div></div>'+
    bigHTML(ipo)+meterHTML(ipo)+
    '<div class="facts"><div class="fact"><div class="k">Band</div><div class="v">'+fmtINR(ipo.priceBand.min)+'–'+fmtINR(ipo.priceBand.max)+'</div></div><div class="fact"><div class="k">Min invest</div><div class="v">'+fmtINR(minAmt)+'</div></div><div class="fact"><div class="k">GMP</div><div class="v">'+(ipo.gmp!=null?'<span class="gmp">+'+fmtINR(ipo.gmp)+'</span>':'—')+'</div></div></div>'+
    railHTML(ipo)+'</article>';
  }).join("");
  animate();
}

function animate(){
  const cards=[...document.querySelectorAll(".card")];
  cards.forEach((c,i)=>{
    c.style.animationDelay=(i*90)+"ms";
    requestAnimationFrame(()=>c.classList.add("in"));
    if(canHover && !reduceMotion) tilt(c);
  });
  /* meter fill-in */
  setTimeout(()=>{
    document.querySelectorAll(".fill").forEach(f=>f.style.width=f.dataset.w+"%");
  }, 120);
  /* number count-up */
  if(!reduceMotion){
    document.querySelectorAll("[data-count]").forEach(el=>{
      const target=parseFloat(el.dataset.count), suf=el.dataset.suffix||"", pre=el.dataset.prefix||"";
      const t0=performance.now(), dur=900;
      const step=(now)=>{
        const p=Math.min(1,(now-t0)/dur), ease=1-Math.pow(1-p,3);
        el.textContent=pre+(target*ease).toFixed(1)+suf;
        if(p<1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    });
  }else{
    document.querySelectorAll("[data-count]").forEach(el=>{
      el.textContent=(el.dataset.prefix||"")+parseFloat(el.dataset.count).toFixed(1)+(el.dataset.suffix||"");
    });
  }
}

/* 3D tilt + glare tracking */
function tilt(card){
  let raf=null;
  card.addEventListener("pointermove",e=>{
    if(raf) return;
    raf=requestAnimationFrame(()=>{
      const r=card.getBoundingClientRect();
      const px=(e.clientX-r.left)/r.width, py=(e.clientY-r.top)/r.height;
      const rx=(py-.5)*-10, ry=(px-.5)*12;
      card.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) translateY(-4px)`;
      card.style.setProperty("--gx",(px*100)+"%");
      card.style.setProperty("--gy",(py*100)+"%");
      raf=null;
    });
  });
  card.addEventListener("pointerleave",()=>{
    card.style.transform="rotateX(0) rotateY(0) translateY(0)";
    card.style.transition="transform .5s cubic-bezier(.2,.8,.2,1), box-shadow .25s ease";
    setTimeout(()=>card.style.transition="box-shadow .25s ease",500);
  });
}

load();
</script>
</body>
</html>
